name: 打包红米 K80 Pro KernelSU 镜像

on:
  workflow_dispatch: # 手动触发，参数全部写死在下方
  push:
    branches: [ main ]

env:
  # ==================== 写死的参数配置 ====================
  ANDROID_VERSION: 'android15'     # 你的系统版本
  KERNEL_VERSION: '6.6'            # 你的内核大版本
  KSU_VERSION: 'v3.2.4'            # 想要集成的 KernelSU 版本
  # =======================================================

jobs:
  patch_boot:
    runs-on: ubuntu-latest
    steps:
    - name: 检出本仓库代码
      uses: actions/checkout@v4

    - name: 安装 magiskboot 等镜像处理工具
      run: |
        sudo apt-get update
        sudo apt-get install -y wget cpio
        # 下载 magiskboot 工具用于解包和打包
        wget https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk
        unzip Magisk-v27.0.apk "lib/x86_64/libmagiskboot.so" -d ./
        mv lib/x86_64/libmagiskboot.so ./magiskboot
        chmod +x magiskboot

    - name: 下载 KernelSU 官方 Android 15 驱动模块
      run: |
        wget https://github.com/tiann/KernelSU/releases/download/${{ env.KSU_VERSION }}/${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}_kernelsu.ko -O kernelsu.ko

    - name: 解包、注入并重新打包 init_boot
      run: |
        # 确保你已经把官方的 init_boot.img 放到了仓库根目录
        if [ ! -f "init_boot.img" ]; then
          echo "错误：请先将你手机官方的 init_boot.img 上传到仓库根目录！"
          exit 1
        fi
        
        # 1. 解包官方镜像
        ./magiskboot unpack init_boot.img
        
        # 2. 将 KernelSU 模块强行打包进 ramdisk
        ./magiskboot cpio ramdisk.cpio "add 0644 lib/modules/kernelsu.ko kernelsu.ko"
        
        # 3. 重新打包生成新镜像
        ./magiskboot repack init_boot.img ksu_init_boot.img

    - name: 上传成品镜像
      uses: actions/upload-artifact@v4
      with:
        name: Redmi-K80Pro-KernelSU-init_boot
        path: ksu_init_boot.img
